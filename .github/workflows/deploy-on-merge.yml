name: Deploy on merge to master

on:
  pull_request:
    types:
      - closed
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Run make deploy
    # Only deploy for PRs that were actually merged into master.
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ap-southeast-1

      - name: Deploy
        env:
          WEB_BOT_AUTH_PRIVATE_KEY: ${{ secrets.WEB_BOT_AUTH_PRIVATE_KEY }}
        run: |
          set +x
          KEY_FILE=""
          cleanup() {
            if [ -n "$KEY_FILE" ]; then
              rm -f "$KEY_FILE"
            fi
          }
          trap cleanup EXIT
          if [ -n "${WEB_BOT_AUTH_PRIVATE_KEY:-}" ]; then
            KEY_FILE="$(mktemp)"
            chmod 600 "$KEY_FILE"
            printf '%s' "$WEB_BOT_AUTH_PRIVATE_KEY" > "$KEY_FILE"
            unset WEB_BOT_AUTH_PRIVATE_KEY
            export WEB_BOT_AUTH_PRIVATE_KEY_FILE="$KEY_FILE"
          fi
          make --silent deploy
